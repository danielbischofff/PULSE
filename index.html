<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PULSE Metronome</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="top-bar">
      <div class="brand">
        <span class="brand-name">PULSE</span>
        <span class="brand-tag">Metronome</span>
      </div>
      <nav class="tabs" role="tablist" aria-label="App sections">
        <button class="tab active" data-tab="metronome" role="tab" aria-selected="true">Metronome</button>
        <button class="tab" data-tab="practice" role="tab" aria-selected="false">Practice</button>
      </nav>
    </header>

    <main>
      <section id="metronome" class="section active" role="tabpanel">
        <div class="layout-grid">
          <div class="panel large-panel">
            <div class="meter-card">
              <div class="meter-ring" id="meterRing">
                <div class="meter-center" id="meterCenter">
                  <div class="bpm-value" id="bpmValue">120</div>
                  <div class="meter-label">BPM</div>
                </div>
              </div>
              <div class="meter-controls">
                <button class="button secondary" id="tapBpmButton">Tap</button>
                <div class="input-group">
                  <label for="bpmInput">BPM</label>
                  <input id="bpmInput" type="number" min="30" max="250" value="120" inputmode="numeric" />
                </div>
              </div>
            </div>
          </div>

          <div class="panel small-panel">
            <div class="control-group">
              <div class="control-row">
                <label for="timeSignature">Time signature</label>
                <select id="timeSignature">
                  <option value="2">2/4</option>
                  <option value="3">3/4</option>
                  <option value="4" selected>4/4</option>
                  <option value="5">5/4</option>
                  <option value="6">6/8</option>
                </select>
              </div>
              <div class="control-row">
                <label for="subdivision">Subdivision</label>
                <select id="subdivision">
                  <option value="quarter">Quarter</option>
                  <option value="eighth" selected>Eighth</option>
                  <option value="triplet">Triplet</option>
                  <option value="sixteenth">Sixteenth</option>
                </select>
              </div>
              <div class="control-row volume-row">
                <label for="volumeControl">Volume</label>
                <input id="volumeControl" type="range" min="0" max="100" value="85" />
              </div>
            </div>

            <div class="accent-panel">
              <div class="accent-header">
                <span>Accents</span>
                <label class="toggle-label">
                  <input type="checkbox" id="strongFirstBeat" checked />
                  <span>First beat strong</span>
                </label>
              </div>
              <div id="accentBlocks" class="accent-blocks"></div>
            </div>
          </div>
        </div>

        <div class="action-row">
          <button class="button primary large" id="startStopButton">Start</button>
          <div class="status-bar">
            <span id="beatStatus">Ready</span>
            <span id="barStatus"></span>
          </div>
        </div>
      </section>

      <section id="practice" class="section" role="tabpanel" hidden>
        <div class="practice-card">
          <div class="practice-row">
            <div class="practice-input">
              <label for="practiceX">Play bars</label>
              <input id="practiceX" type="number" min="1" max="16" value="4" />
            </div>
            <div class="practice-input">
              <label for="practiceY">Mute bars</label>
              <input id="practiceY" type="number" min="1" max="16" value="4" />
            </div>
            <div class="practice-input">
              <label for="practiceZ">Re-entry bars</label>
              <input id="practiceZ" type="number" min="1" max="8" value="1" />
            </div>
          </div>
          <div class="practice-row">
            <button class="button primary large" id="practiceStartStop">Start Practice</button>
            <div class="practice-status">
              <div><span class="status-label">Mode</span><span id="practiceStatus">Ready</span></div>
              <div><span class="status-label">Cycle</span><span id="practiceCycle">0 / 0</span></div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
